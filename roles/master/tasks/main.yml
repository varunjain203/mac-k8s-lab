---
- name: Initialize Cluster
  block:
    - name: Set control plane endpoint (haproxy or this master)
      set_fact:
        control_plane_endpoint: >-
          {% if groups['haproxy'] is defined and groups['haproxy'] | length > 0 %}
          {{ hostvars[groups['haproxy'][0]].ansible_host }}:6443
          {% else %}
          {{ hostvars[groups['masters'][0]].ansible_host }}:6443
          {% endif %}

    - name: Initialize master (only on first master)
      command: >-
        kubeadm init --pod-network-cidr=10.244.0.0/16
        {% if groups['masters'] | length > 1 %} --control-plane-endpoint {{ control_plane_endpoint }} --upload-certs {% endif %}
      args:
        creates: /etc/kubernetes/admin.conf
  when: inventory_hostname == groups['masters'][0]

- name: Generate Join Command
  command: kubeadm token create --print-join-command
  register: join_command_raw
  when: inventory_hostname == groups['masters'][0]

- name: Share Join Command with all nodes
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  when: inventory_hostname == groups['masters'][0]

- name: If HA requested, generate certificate key and join additional masters to control plane
  block:
    - name: Generate certificate key for control-plane joins
      command: kubeadm init phase upload-certs --upload-certs
      register: certkey_raw
      failed_when: certkey_raw.rc != 0 and certkey_raw.rc is defined

    - name: Extract certificate key
      set_fact:
        certificate_key: "{{ certkey_raw.stdout_lines[-1] }}"

    - name: Build control-plane join command
      set_fact:
        control_plane_join: "{{ join_command_raw.stdout }} --control-plane --certificate-key {{ certificate_key }}"

    - name: Join additional masters to the control plane (delegated from first master)
      ansible.builtin.command: "{{ control_plane_join }}"
      delegate_to: "{{ item }}"
      loop: "{{ groups['masters'][1:] }}"
  when:
    - inventory_hostname == groups['masters'][0]
    - groups['masters'] | length > 1